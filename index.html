<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI FLICK PICKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: #fff; }
        .netflix-red { color: #E50914; }
        .btn-ai { background: linear-gradient(135deg, #E50914 0%, #B20710 100%); box-shadow: 0 0 30px rgba(229, 9, 20, 0.4); }
        .prompt-card { animation: fadeIn 0.4s ease-out forwards; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen justify-center pb-20">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold netflix-red italic tracking-tighter uppercase">AI FLICK PICKER</h1>
        <p class="text-zinc-500 text-[10px] mt-2 tracking-[0.2em] uppercase italic font-light">English AI Search Prompts</p>
    </header>

    <div class="w-full max-w-sm space-y-6">
        <div>
            <label class="block mb-3 text-xs font-bold text-zinc-400 uppercase text-center tracking-widest">Select Movie Vibe</label>
            <select id="genre" class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-3xl text-white text-lg appearance-none text-center focus:outline-none shadow-2xl">
                <option value="all">Surprise Me (Anything Great)</option>
                <option value="history">History & Period Pieces</option>
                <option value="bio">Biographies & True Stories</option>
                <option value="action">High Adrenaline Action</option>
                <option value="scifi">Mind-bending Sci-Fi</option>
                <option value="drama">Emotional & Deep Drama</option>
                <option value="horror">Dark & Gritty Horror</option>
                <option value="crime">Mastermind Crime & Heists</option>
                <option value="anime">Epic & Visual Anime</option>
                <option value="thai">Top Tier Thai Cinema</option>
            </select>
        </div>

        <button id="randomBtn" class="w-full py-6 rounded-full text-xl font-bold btn-ai active:scale-95 transition-all uppercase tracking-tighter">
            ✨ Generate AI Prompts
        </button>
    </div>

    <div id="results" class="mt-12 w-full max-w-sm hidden">
        <h2 class="text-[10px] font-bold text-zinc-500 mb-6 text-center uppercase tracking-widest">Jamie's AI Recommendations:</h2>
        <div id="promptList" class="space-y-4"></div>
    </div>

    <script>
        const prompts = {
            history: ["Heartbreaking historical movies based on true events", "Authentic World War II movies with great visuals", "Tense political conflicts and power struggles", "Period dramas with stunning costumes and deep stories"],
            bio: ["Inspiring biographies of geniuses and outsiders", "Remarkable true stories of people who changed the world", "Secret lives of legendary artists and musicians", "Hard-hitting documentaries about world-changing events"],
            action: ["Fast-paced action movies with non-stop excitement", "Futuristic high-tech combat and chase scenes", "Smart spy thrillers with betrayal and plot twists", "Gritty street-level action with realistic stunts"],
            scifi: ["Mind-bending sci-fi about the future of humanity", "Complex time travel movies that make you think", "Stunning space exploration movies with deep themes", "Dystopian futures and cyberpunk aesthetics"],
            drama: ["Breathtaking family dramas that will make you cry", "Intimate character studies about broken relationships", "Deeply emotional movies about hope and resilience", "Atmospheric slow-burn dramas with incredible acting"],
            horror: ["Terrifying supernatural horror that stays with you", "Dark psychological thrillers with shocking twists", "Suspenseful survival horror in isolated locations", "Creature features with intense atmosphere"],
            crime: ["Clever heist movies with unpredictable masterplans", "Gripping true crime stories and serial killer investigations", "Gritty underworld stories about mafia and power", "Complex legal thrillers and courtroom dramas"],
            anime: ["Visual masterpiece anime with epic action", "Cerebral sci-fi anime about the human soul", "Heartfelt and emotional animated stories", "Dark fantasy anime for mature audiences"],
            thai: ["Award-winning Thai movies with global acclaim", "Tense Thai mystery series with huge twists", "Heartwarming Thai romance and feel-good stories", "Artistic Thai cinema with deep cultural meaning"],
            all: ["Under-the-radar hidden gems with high ratings", "Must-watch Netflix Originals everyone is talking about", "Mind-blowing movies with the best plot twists", "Life-changing movies that stay in your head for days"]
        };

        const modifiers = ["on Netflix", "trending now", "critically acclaimed", "top rated", "with great reviews", "must watch"];

        document.getElementById('randomBtn').addEventListener('click', function() {
            const genre = document.getElementById('genre').value;
            const promptList = document.getElementById('promptList');
            const resultsDiv = document.getElementById('results');
            
            promptList.innerHTML = '';
            resultsDiv.classList.add('hidden');

            setTimeout(() => {
                let pool = prompts[genre];
                let selected = [...pool].sort(() => Math.random() - 0.5).slice(0, 3);

                selected.forEach((text, index) => {
                    const mod = modifiers[Math.floor(Math.random() * modifiers.length)];
                    const fullPrompt = `${text} ${mod}`;
                    
                    const card = document.createElement('div');
                    card.className = "prompt-card p-6 rounded-3xl flex flex-col space-y-4";
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    const searchUrl = `https://www.netflix.com/search?q=${encodeURIComponent(fullPrompt)}`;
                    
                    card.innerHTML = `
                        <div class="text-sm font-medium text-zinc-100 leading-snug italic">"${fullPrompt}"</div>
                        <button onclick="window.location.href='${searchUrl}'" 
                                class="w-full bg-white text-black py-3 rounded-2xl text-[10px] font-extrabold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-colors">
                            SEARCH ON NETFLIX
                        </button>
                    `;
                    promptList.appendChild(card);
                });

                resultsDiv.classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 200);
        });
    </script>
</body>
</html>
