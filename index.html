<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI FLICK PICKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #000; color: #fff; }
        .netflix-red { color: #E50914; }
        .btn-ai { background: linear-gradient(135deg, #E50914 0%, #B20710 100%); box-shadow: 0 0 30px rgba(229, 9, 20, 0.4); }
        .prompt-card { animation: fadeIn 0.4s ease-out forwards; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        select { background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23ffffff' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 1rem center; background-repeat: no-repeat; background-size: 1.5em 1.5em; }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen pb-20 pt-10">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold netflix-red italic tracking-tighter uppercase">AI FLICK PICKER</h1>
        <p class="text-zinc-500 text-[10px] mt-2 tracking-[0.2em] uppercase italic font-light">Pro AI Prompt Engineering</p>
    </header>

    <div class="w-full max-w-sm space-y-6">
        <div>
            <label class="block mb-3 text-xs font-bold text-zinc-400 uppercase text-center tracking-widest">Select Your Vibe</label>
            <select id="genre" class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-3xl text-white text-lg appearance-none text-center focus:outline-none shadow-2xl">
                <option value="all">Surprise Me (Any Vibe)</option>
                <option value="comedy">Laugh Out Loud (Comedy)</option>
                <option value="standup">Stand-up Comedy Specials</option>
                <option value="us_series">Top-rated US TV Series</option>
                <option value="foreign">Foreign Language Gems</option>
                <option value="limited">Limited Series (One-Season Binge)</option>
                <option value="history">History & Period Pieces</option>
                <option value="bio">Biographies & True Stories</option>
                <option value="action">High Adrenaline Action</option>
                <option value="scifi">Mind-bending Sci-Fi</option>
                <option value="drama">Emotional & Deep Drama</option>
                <option value="horror">Dark & Gritty Horror</option>
                <option value="crime">Mastermind Crime & Heists</option>
                <option value="thai">Thai Cinema & Series</option>
            </select>
        </div>

        <button id="randomBtn" class="w-full py-6 rounded-full text-xl font-bold btn-ai active:scale-95 transition-all uppercase tracking-tighter">
            ✨ Generate AI Prompts
        </button>
    </div>

    <div id="results" class="mt-12 w-full max-w-sm hidden">
        <h2 class="text-[10px] font-bold text-zinc-500 mb-6 text-center uppercase tracking-widest italic">Choose a prompt to search on Netflix:</h2>
        <div id="promptList" class="space-y-4"></div>
    </div>

    <script>
        const prompts = {
            comedy: ["Feel-good romantic comedies with happy endings", "Hilarious dark comedies with clever writing", "Classic slapstick comedies for family night", "Witty satirical movies about modern life"],
            standup: ["Best stand-up comedy specials by world-famous comedians", "Raunchy and edgy stand-up comedy shows", "Inspiring and storytelling-heavy stand-up specials", "Trending new stand-up comedy from diverse voices"],
            us_series: ["Critically acclaimed US drama series with multiple seasons", "Must-watch American sitcoms for binge-watching", "Gritty US crime drama series with high ratings", "Captivating US political or legal TV shows"],
            foreign: ["Top-rated foreign language movies with English subtitles", "Masterpiece international cinema from Europe and Asia", "Thrilling Non-English suspense and mystery movies", "Emotional world cinema that won global awards"],
            limited: ["Compelling limited series you can finish in one weekend", "Gripping mini-series based on true crimes", "Visually stunning limited series with deep stories", "Binge-worthy short series with high IMDb scores"],
            history: ["Authentic historical dramas based on world events", "Breathtaking period pieces with stunning cinematography", "Tense war movies and historical conflicts", "Fascinating history series about royalty and power"],
            bio: ["Inspiring biopics about legendary world leaders", "Intimate true stories of iconic musicians and artists", "Compelling biographies of geniuses and rebels", "Hard-hitting documentaries about remarkable lives"],
            action: ["Intense action thrillers with non-stop excitement", "High-octane car chases and martial arts movies", "Smart spy action with global conspiracies", "Gritty street-level combat and survival movies"],
            scifi: ["Mind-blowing sci-fi about AI and future tech", "Complex time travel and parallel universe movies", "Epic space exploration and alien encounter stories", "Cyberpunk and dystopian future masterpieces"],
            drama: ["Powerful tear-jerking dramas about family and love", "Deep character studies and emotional journeys", "Thought-provoking movies about social issues", "Beautifully shot indie dramas with great acting"],
            horror: ["Genuinely scary supernatural horror movies", "Dark psychological thrillers that mess with your mind", "Cult classic horror and modern slasher films", "Suspenseful creature features and monster movies"],
            crime: ["Clever heist movies with elaborate plans", "Dark and gritty noir crime stories", "Intriguing legal thrillers and courtroom dramas", "True crime investigations and cold case stories"],
            thai: ["Critically acclaimed Thai horror and thrillers", "Heartfelt Thai romantic series and movies", "Epic Thai historical dramas and action", "Cutting-edge Thai indie cinema and originals"],
            all: ["Under-the-radar hidden gems on Netflix", "Movies with the most unexpected plot twists", "Critically acclaimed Netflix Originals", "Feel-good movies to watch when you're tired"]
        };

        const modifiers = ["trending in Thailand", "award winning", "top rated this year", "hidden gems", "popular now", "critically acclaimed"];

        document.getElementById('randomBtn').addEventListener('click', function() {
            const genre = document.getElementById('genre').value;
            const promptList = document.getElementById('promptList');
            const resultsDiv = document.getElementById('results');
            
            promptList.innerHTML = '';
            resultsDiv.classList.add('hidden');

            setTimeout(() => {
                let pool = prompts[genre];
                // Shuffle pool to ensure variety every time
                let selected = [...pool].sort(() => Math.random() - 0.5).slice(0, 3);

                selected.forEach((text, index) => {
                    const mod = modifiers[Math.floor(Math.random() * modifiers.length)];
                    const fullPrompt = `${text} ${mod}`;
                    
                    const card = document.createElement('div');
                    card.className = "prompt-card p-6 rounded-3xl flex flex-col space-y-4";
                    card.style.animationDelay = `${index * 0.1}s`;
                    
                    const searchUrl = `https://www.netflix.com/search?q=${encodeURIComponent(fullPrompt)}`;
                    
                    card.innerHTML = `
                        <div class="text-sm font-medium text-zinc-100 leading-snug italic">"${fullPrompt}"</div>
                        <button onclick="window.location.href='${searchUrl}'" 
                                class="w-full bg-white text-black py-3 rounded-2xl text-[10px] font-extrabold uppercase tracking-[0.2em] hover:bg-zinc-200 transition-colors">
                            SEARCH ON NETFLIX
                        </button>
                    `;
                    promptList.appendChild(card);
                });

                resultsDiv.classList.remove('hidden');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 200);
        });
    </script>
</body>
</html>
